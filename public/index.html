<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV Channel</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="stylesheet" href="/css/style.css">
    
    <!-- Video Player Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <div id="tv-screen">
        <div id="video-container">
            <video id="main-video" autoplay playsinline></video>
            <div id="youtube-player" style="display:none; width:100%; height:100%;"></div>
        </div>
        
        <!-- Channel Logo Bug (Top Right) -->
        <div id="channel-logo">
            <img src="https://cdn-icons-png.flaticon.com/512/3507/3507119.png" alt="Channel Logo">
        </div>

        <!-- Now Playing Overlay (Bottom Left) -->
        <div id="now-playing">
            <h1 id="video-title">Loading...</h1>
        </div>
        
        <!-- Ad Overlay -->
        <div id="ad-overlay" class="ad-overlay">
            <div class="ad-countdown">Returning to video in <span id="ad-timer">30</span> seconds</div>
            <video id="ad-video" playsinline muted></video>
        </div>

        <!-- Initial Start Button (Browser Auto-play policy bypass) -->
        <div id="start-overlay" onclick="startTV()">
            <div>Click to Start TV</div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/player.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
