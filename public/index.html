<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium OTT Streaming</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OTT Stream">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    
    <!-- Video Player Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <div id="app">
        <!-- Home Screen -->
        <div id="home-screen" class="screen active">
            <header>
                <div class="logo">OTT Stream</div>
                <nav>
                    <button class="nav-btn active" data-target="home">Home</button>
                    <button class="nav-btn" data-target="movies">Movies</button>
                    <button class="nav-btn" data-target="series">Series</button>
                    <button class="nav-btn" onclick="window.location.href='/admin.html'">Admin</button>
                </nav>
            </header>
            
            <div id="hero" class="hero">
                <div class="hero-content">
                    <h1 id="hero-title">Featured Movie</h1>
                    <p id="hero-desc">Action packed thriller you don't want to miss.</p>
                    <button id="hero-play" class="btn primary">▶ Play Now</button>
                </div>
            </div>

            <div id="categories-container" class="categories">
                <!-- Dynamically loaded categories and rows will go here -->
            </div>
        </div>

        <!-- Video Player Screen -->
        <div id="player-screen" class="screen">
            <button class="back-btn" onclick="closePlayer()">← Back</button>
            <div id="video-container">
                <video id="main-video" controls autoplay playsinline></video>
                <div id="youtube-player" style="display:none; width:100%; height:100%;"></div>
            </div>
            
            <!-- Ad Overlay -->
            <div id="ad-overlay" class="ad-overlay">
                <div class="ad-countdown">Returning to video in <span id="ad-timer">30</span> seconds</div>
                <video id="ad-video" playsinline muted></video>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/app.js"></script>
    <script src="/js/player.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
